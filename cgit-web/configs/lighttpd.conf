server.modules = (
  "mod_access",
  "mod_alias",
  "mod_cgi",
  "mod_setenv",
  "mod_rewrite"
)

server.document-root = "/usr/share/cgit"
server.port = 80
server.username = "www-data"
server.groupname = "www-data"

index-file.names = ()

mimetype.assign = (
  ".css"  => "text/css",
  ".png"  => "image/png",
  ".ico"  => "image/x-icon",
  ".txt"  => "text/plain",
  ".html" => "text/html"
)

alias.url += (
  "/cgit.cgi" => "/usr/lib/cgit/cgit.cgi"
)

cgi.assign = (
  ".cgi" => ""
)

setenv.set-environment = (
  "CGIT_CONFIG" => "/etc/cgitrc"
)

url.rewrite-once = (
  "^/$" => "/cgit.cgi/",
  "^/repos/?$" => "/cgit.cgi/",
  "^/repos/(.*)$" => "/cgit.cgi/$1"
)